# Build and publish optical releases to GitHub Releases.
#
# Triggered by pushing a tag matching `v*` (e.g. `v0.2.0`).
# Builds BOTH binaries for each platform:
#   - optical         (node binary, no center feature)
#   - optical-center  (config center + node, with embedded web UI)
#
# Both use the `release-perf` profile (fat LTO + codegen-units=1).
# Asset names MUST match `asset_name_for()` in crates/optical-core/src/updater.rs:
#   Windows: optical-x86_64-pc-windows-msvc.exe / optical-center-x86_64-pc-windows-msvc.exe
#   Linux:   optical-x86_64-unknown-linux-musl / optical-center-x86_64-unknown-linux-musl
#           (fully static, no glibc dependency)
#
# A SHA256 checksum is published alongside each binary; the in-process updater
# refuses to install a binary that fails integrity verification.
#
# Node.js is required to build the optical-center web UI (build.rs runs
# `npm install && npm run build`); the setup-node action provides it.

name: release

on:
  push:
    tags:
      - "v*"

# Required to create a Release and upload assets.
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.bin }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Node binary — Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: optical
            asset_name: optical-x86_64-pc-windows-msvc.exe
          # Node binary — Linux (musl, fully static)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin: optical
            asset_name: optical-x86_64-unknown-linux-musl
          # Center binary — Windows (needs Node for web UI build)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: optical-center
            asset_name: optical-center-x86_64-pc-windows-msvc.exe
          # Center binary — Linux (musl, needs Node for web UI build)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin: optical-center
            asset_name: optical-center-x86_64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Setup Node.js (for optical-center web UI build)
        if: matrix.bin == 'optical-center'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build (release-perf profile)
        run: cargo build --profile release-perf --target ${{ matrix.target }} -p ${{ matrix.bin }}

      - name: Rename binary to asset name (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release-perf/${{ matrix.bin }}.exe" `
                    "${{ matrix.asset_name }}" -Force

      - name: Rename binary to asset name (Linux)
        if: runner.os == 'Linux'
        run: |
          cp "target/${{ matrix.target }}/release-perf/${{ matrix.bin }}" "${{ matrix.asset_name }}"
          chmod +x "${{ matrix.asset_name }}"

      - name: Generate SHA256 checksum
        shell: bash
        run: sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"

      - name: Upload asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          generate_release_notes: true
          # Tags containing "-" after the version (e.g. v0.1.0-rc1) are prereleases.
          prerelease: ${{ contains(github.ref_name, '-') }}
