# Build and publish optical releases to GitHub Releases.
#
# Triggered by pushing a tag matching `v*` (e.g. `v0.2.0`).
# Builds the `release-perf` profile (fat LTO + codegen-units=1) for both
# Windows and Linux x86_64, renames the binary to the asset naming convention
# expected by `optical update`, and uploads it to a GitHub Release.
#
# The asset names MUST match the `ASSET_NAME` constant in `src/updater.rs`:
#   Windows: optical-x86_64-pc-windows-msvc.exe
#   Linux:   optical-x86_64-unknown-linux-musl (fully static, no glibc dependency)

name: release

on:
  push:
    tags:
      - "v*"

# Required to create a Release and upload assets.
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: optical-x86_64-pc-windows-msvc.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: optical-x86_64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build (release-perf profile)
        run: cargo build --profile release-perf --target ${{ matrix.target }}

      - name: Rename binary to asset name (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release-perf/optical.exe" `
                    "${{ matrix.asset_name }}" -Force

      - name: Rename binary to asset name (Linux)
        if: runner.os == 'Linux'
        run: |
          cp "target/${{ matrix.target }}/release-perf/optical" "${{ matrix.asset_name }}"
          chmod +x "${{ matrix.asset_name }}"

      - name: Generate SHA256 checksum
        shell: bash
        run: sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"

      - name: Upload asset to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          generate_release_notes: true
          # Tags containing "-" after the version (e.g. v0.1.0-rc1) are prereleases.
          prerelease: ${{ contains(github.ref_name, '-') }}
